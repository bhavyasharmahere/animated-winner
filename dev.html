<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Developer's Profile</title>
    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-light: #64748b;
            --primary: #4f46e5;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 4rem 1rem; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .dev-card { width: 100%; max-width: 450px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); text-align: center; }
        
        /* Updated image avatar styles */
        .avatar { 
            width: 90px; 
            height: 90px; 
            border-radius: 50%; 
            margin: 0 auto 1.5rem; 
            object-fit: cover; /* Prevents picture from stretching out of aspect ratio */
            border: 3px solid #e0e7ff; 
            display: block;
        }
        
        h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
        .title { color: var(--primary); font-weight: 600; font-size: 1rem; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
        p { color: var(--text-light); font-size: 1.05rem; line-height: 1.6; margin-bottom: 2rem; }
        .back-btn { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-light); text-decoration: none; font-weight: 600; font-size: 0.95rem; transition: color 0.2s; }
        .back-btn:hover { color: var(--text); }
    </style>
</head>
<body>
    <div class="dev-card">
        <img src="avatar.png" alt="Bhavya Sharma" class="avatar">
        
        <h1>Bhavya Sharma</h1>
        <div class="title">God Developer</div>
        <p>Crafting lightweight, high-performance web applications for modern classrooms using serverless technology.</p>
        <a href="/" class="back-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Back to 13207
        </a>
    </div>
</body>
</html>
