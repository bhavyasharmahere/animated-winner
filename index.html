<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom File Share</title>
    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-light: #64748b;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 3rem 1rem; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 550px; }
        header { text-align: center; margin-bottom: 2.5rem; }
        h1 { font-size: 1.75rem; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
        p { color: var(--text-light); font-size: 0.95rem; margin-top: 0.25rem; }
        .tabs { display: flex; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
        .tab-btn { background: none; border: none; color: var(--text-light); font-weight: 600; font-size: 0.95rem; cursor: pointer; padding: 0.5rem 0.75rem; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .hidden { display: none; }
        .form-group { margin-bottom: 1.25rem; display: flex; flex-direction: column; gap: 0.5rem; }
        label { font-size: 0.85rem; font-weight: 600; color: var(--text-light); }
        input, select { padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; outline: none; transition: border 0.2s; background: #fdfdfd; }
        input:focus, select:focus { border-color: var(--primary); }
        button.btn { background: var(--primary); color: white; border: none; padding: 0.75rem; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.2s; width: 100%; font-size: 0.95rem; }
        button.btn:hover { background: var(--primary-hover); }
        
        /* Beautiful File Items with Ellipsis text fixing */
        .file-item { display: flex; justify-content: space-between; align-items: center; gap: 1rem; padding: 1rem; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 0.75rem; background: var(--card-bg); transition: transform 0.2s; }
        .file-item:hover { transform: translateY(-1px); }
        .file-info { display: flex; flex-direction: column; gap: 0.25rem; min-width: 0; }
        .file-name { font-weight: 600; font-size: 0.95rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-meta { font-size: 0.8rem; color: var(--text-light); }
        .download-btn { background: #f1f5f9; color: var(--text); border: none; padding: 0.5rem 1rem; border-radius: 6px; font-weight: 600; font-size: 0.85rem; cursor: pointer; text-decoration: none; transition: background 0.2s; flex-shrink: 0; }
        .download-btn:hover { background: #e2e8f0; }
        .status { font-size: 0.9rem; text-align: center; margin-top: 0.75rem; font-weight: 500; }
        .status.error { color: #ef4444; }
        .status.success { color: #10b981; }

        /* Custom File Upload Box Styling */
        .file-drop-zone { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; padding: 2rem 1rem; border: 2px dashed var(--border); border-radius: 10px; background: #fdfdfd; cursor: pointer; transition: all 0.2s ease; text-align: center; }
        .file-drop-zone:hover, .file-drop-zone.dragover { border-color: var(--primary); background: #f5f3ff; }
        .upload-icon { color: var(--text-light); transition: color 0.2s; }
        .file-drop-zone:hover .upload-icon, .file-drop-zone.dragover .upload-icon { color: var(--primary); }
        #file-label-text { font-size: 0.9rem; color: var(--text-light); font-weight: 500; word-break: break-all; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Classroom Hub</h1>
            <p>Lightweight temporary workspace sharing</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" id="student-tab">Available Files</button>
            <button class="tab-btn" id="teacher-tab">Teacher Upload</button>
        </div>

        <div id="student-view">
            <div id="file-list">
                <p style="text-align: center; padding: 2rem; color: var(--text-light);">Loading files...</p>
            </div>
        </div>

        <div id="teacher-view" class="hidden card">
            <form id="upload-form">
                <div class="form-group">
                    <label for="teacher-password">Access Code</label>
                    <input type="password" id="teacher-password" required placeholder="Enter upload password">
                </div>
                
                <div class="form-group">
                    <label>Select File (Max 25MB)</label>
                    <label for="file-input" class="file-drop-zone" id="drop-zone">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="upload-icon"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        <span id="file-label-text">Tap to select or drag file here</span>
                        <input type="file" id="file-input" required style="display: none;">
                    </label>
                </div>

                <div class="form-group">
                    <label for="ttl-input">Visibility Expiration</label>
                    <select id="ttl-input">
                        <option value="1800">30 Minutes</option>
                        <option value="3600" selected>1 Hour</option>
                        <option value="14400">4 Hours</option>
                        <option value="86400">24 Hours</option>
                    </select>
                </div>
                
                <button type="submit" class="btn">Upload & Publish</button>
                <div id="upload-status" class="status"></div>
            </form>
        </div>
    </div>

    <script>
        const sTab = document.getElementById('student-tab');
        const tTab = document.getElementById('teacher-tab');
        const sView = document.getElementById('student-view');
        const tView = document.getElementById('teacher-view');
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const fileLabelText = document.getElementById('file-label-text');

        sTab.addEventListener('click', () => {
            sTab.classList.add('active'); tTab.classList.remove('active');
            sView.classList.remove('hidden'); tView.classList.add('hidden');
            loadFiles();
        });

        tTab.addEventListener('click', () => {
            tTab.classList.add('active'); sTab.classList.remove('active');
            tView.classList.remove('hidden'); sView.classList.add('hidden');
        });

        async function loadFiles() {
            const fileList = document.getElementById('file-list');
            try {
                const res = await fetch('/api/files');
                if (!res.ok) throw new Error();
                const files = await res.json();
                
                if (files.length === 0) {
                    fileList.innerHTML = '<p style="text-align: center; padding: 2rem; color: var(--text-light);">No active downloads right now.</p>';
                    return;
                }

                fileList.innerHTML = files.map(file => {
                    const expiry = new Date(file.expires * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    return `
                        <div class="file-item">
                            <div class="file-info">
                                <span class="file-name">${escapeHtml(file.name)}</span>
                                <span class="file-meta">Self-destructs at ${expiry}</span>
                            </div>
                            <a href="/api/files?id=${file.id}" class="download-btn" download>Download</a>
                        </div>
                    `;
                }).join('');
            } catch {
                fileList.innerHTML = '<p style="text-align: center; padding: 2rem; color: #ef4444;">Unable to fetch files.</p>';
            }
        }

        document.getElementById('upload-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const status = document.getElementById('upload-status');
            status.className = 'status'; status.innerText = 'Publishing to web...';

            const formData = new FormData();
            formData.append('password', document.getElementById('teacher-password').value);
            formData.append('file', fileInput.files[0]);
            formData.append('ttl', document.getElementById('ttl-input').value);

            try {
                const res = await fetch('/api/files', { method: 'POST', body: formData });
                if (res.ok) {
                    status.classList.add('success'); status.innerText = 'Published successfully!';
                    document.getElementById('upload-form').reset();
                    fileLabelText.innerText = 'Tap to select or drag file here';
                    fileLabelText.style.color = 'var(--text-light)';
                } else {
                    status.classList.add('error'); status.innerText = await res.text() || 'Error occurred.';
                }
            } catch {
                status.classList.add('error'); status.innerText = 'Network error.';
            }
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                fileLabelText.innerText = `Selected: ${fileInput.files[0].name}`;
                fileLabelText.style.color = 'var(--text)';
            } else {
                fileLabelText.innerText = 'Tap to select or drag file here';
                fileLabelText.style.color = 'var(--text-light)';
            }
        });

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
            }, false);
        });

        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        loadFiles();
    </script>
</body>
</html>
